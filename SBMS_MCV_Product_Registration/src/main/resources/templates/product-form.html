<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Product Registration Form</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
    body {
        background-color: #f8f9fa;
    }

    .form-card {
        border-radius: 12px;
        border: none;
    }

    .card-header {
        font-size: 24px;
        font-weight: 600;
        letter-spacing: 1px;
    }

    .form-control {
        border-radius: 8px;
    }

    .btn-classic {
        padding: 8px 20px;
        border-radius: 8px;
        font-weight: 500;
    }

    label {
        font-weight: 500;
        margin-bottom: 5px;
    }
</style>

</head>
<body>

<div class="container mt-5">

    <div class="card shadow form-card col-md-6 mx-auto">

        <div class="card-header bg-dark text-white text-center">
            Product Registration
        </div>

        <div class="card-body p-4">

            <div class="text-end mb-3">
                <a th:href="@{/products}" class="btn btn-outline-dark btn-classic">All Products</a>
            </div>

            <p class="text-success text-center fw-bold" th:text="${msg}"></p>
            

            <form th:action="@{/save}" method="post" th:object="${prod}">
            <input type="hidden" th:field="*{id}">
         <p th:if="${#fields.hasErrors('name')}" th:errors="*{name}" class='text-danger'></p>
                <div class="mb-3">
                    <label>Product Name</label>
                    <input type="text" class="form-control" placeholder="Enter product name" th:field="*{name}">
                </div>

                <div class="mb-3">
                <p th:if="${#fields.hasErrors('price')}" th:errors="*{price}" class='text-danger'></p>
                    <label>Price</label>
                    <input type="text" class="form-control" placeholder="Enter product price" th:field="*{price}">
                </div>

                <div class="mb-3">
                <p th:if="${#fields.hasErrors('quantity')}" th:errors="*{quantity}" class='text-danger'></p>
                    <label>Quantity</label>
                    <input type="text" class="form-control" placeholder="Enter quantity" th:field="*{quantity}">
                </div>

                <div class="text-center mt-4">
                    <input type="submit" value="Save Product" class="btn btn-dark btn-classic">
                </div>

            </form>

        </div>

    </div>

</div>

</body>
</html>
