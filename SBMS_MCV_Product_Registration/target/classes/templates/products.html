<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>All Products</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
    body {
        background-color: #f8f9fa;
    }

    .product-card {
        border-radius: 12px;
        border: none;
    }

    .card-header {
        font-size: 24px;
        font-weight: 600;
        letter-spacing: 1px;
    }

    table th, table td {
        vertical-align: middle;
    }

    .btn-classic {
        padding: 8px 20px;
        font-weight: 500;
        border-radius: 8px;
    }
</style>

</head>
<body>

<div class="container mt-5">

    <div class="card shadow product-card">

        <div class="card-header bg-dark text-white text-center">
            Product Inventory
        </div>

        <div class="card-body p-4">

            <table class="table table-hover table-bordered text-center align-middle">

                <thead class="table-secondary">
                    <tr>
                        <th>ID</th>
                        <th>Product Name</th>
                        <th>Price</th>
                        <th>Quantity</th>
                    </tr>
                </thead>

                <tbody>
                    <tr th:each="product : ${products}">
                        <td th:text="${product.id}"></td>
                        <td th:text="${product.name}"></td>
                        <td th:text="${product.price}"></td>
                        <td th:text="${product.quantity}"></td>
                        <td><a th:href="@{edit?(id=${product.id})}" class='btn btn-info'>Edit</a> <a th:href="@{delete?(id=${product.id})}" class='btn btn-info'>Deleted</a></td>
                        
                    </tr>
                </tbody>

            </table>

            <div class="text-center mt-4">
                <a th:href="@{/}" class="btn btn-outline-dark btn-classic">Add New Product</a>
            </div>

        </div>

    </div>

</div>

</body>
</html>
